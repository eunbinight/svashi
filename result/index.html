<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F4F1ED" />
  <title>스바시 — 배정 결과</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="result-page">

    <!-- ① 조회 화면 -->
    <div class="lookup" id="lookup">
      <div class="lookup__inner">
        <p class="lookup__eyebrow">15min · Svashi</p>
        <p class="lookup__title">내 15분을 확인해볼까요?</p>
        <div class="lookup__input-wrap">
          <input
            type="text"
            class="lookup__input"
            id="lookupInput"
            placeholder="이름 또는 이메일을 입력하세요"
            autocomplete="off"
          />
          <ul class="lookup__suggestions" id="lookupSuggestions"></ul>
        </div>
        <p class="lookup__empty" id="lookupEmpty" style="display:none;">신청 내역을 찾을 수 없어요.</p>
      </div>
    </div>

    <!-- ② 결과 화면 -->
    <div class="result" id="result" style="display:none;">
      <div class="result__inner" id="resultInner">
        <!-- JS에서 렌더링 -->
      </div>
    </div>

  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
